<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🎨 JERRY Paint Lab</title>

<style>
:root{
  --cyan:#00ffe1;
  --cyanGlow:rgba(0,255,225,0.55);
  --cyanSoft:rgba(0,255,225,0.14);
  --panel:rgba(0,0,0,0.76);
  --text:#eaffff;
  --muted:#8feee4;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  min-height:100%;
  background:black;
  color:var(--cyan);
  font-family:monospace;
  overflow:hidden;
}

#matrix{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-5;
}

#darkWash{
  position:fixed;
  inset:0;
  z-index:-4;
  background:
    radial-gradient(circle at top, rgba(0,255,225,0.11), transparent 35%),
    linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.9));
  pointer-events:none;
}

#bottomGlow{
  position:fixed;
  left:0;
  bottom:0;
  width:100%;
  height:260px;
  pointer-events:none;
  z-index:-3;
  background:linear-gradient(
    to top,
    rgba(0,255,225,0.25),
    rgba(0,255,225,0.12),
    transparent
  );
}

.page{
  width:min(1240px, calc(100% - 24px));
  height:100vh;
  margin:0 auto;
  padding:14px 0;
  display:grid;
  grid-template-rows:auto 1fr;
  gap:12px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.brand{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.brand h1{
  margin:0;
  font-size:clamp(24px, 4vw, 42px);
  color:var(--cyan);
  text-shadow:0 0 24px var(--cyanGlow);
}

.brand span{
  color:var(--muted);
  font-size:12px;
}

.navLinks{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.navLinks a,
.navLinks button{
  color:var(--text);
  text-decoration:none;
  border:1px solid rgba(0,255,225,0.45);
  background:rgba(0,0,0,0.5);
  padding:9px 12px;
  border-radius:999px;
  transition:0.18s;
  font-family:monospace;
  cursor:pointer;
}

.navLinks a:hover,
.navLinks button:hover{
  color:black;
  background:var(--cyan);
  box-shadow:0 0 18px var(--cyanGlow);
}

.app{
  min-height:0;
  display:grid;
  grid-template-columns:260px 1fr 260px;
  gap:12px;
}

.panel{
  min-height:0;
  background:
    linear-gradient(180deg, rgba(0,255,225,0.06), transparent),
    var(--panel);
  border:1px solid rgba(0,255,225,0.5);
  border-radius:20px;
  padding:12px;
  box-shadow:0 0 20px rgba(0,255,225,0.14);
  overflow:auto;
}

.panel h2{
  margin:0 0 10px;
  color:var(--cyan);
  text-shadow:0 0 12px var(--cyanGlow);
  font-size:16px;
}

.panel p,
.panel label{
  color:var(--muted);
  font-size:12px;
  line-height:1.4;
}

label{
  display:block;
  margin:10px 0 6px;
}

button,
input,
select{
  width:100%;
  background:rgba(0,0,0,0.74);
  color:inherit;
  border:1px solid currentColor;
  border-radius:12px;
  padding:9px 10px;
  font-family:monospace;
  outline:none;
}

button{
  cursor:pointer;
  transition:0.16s;
}

button:hover{
  background:currentColor;
  color:black;
  box-shadow:0 0 16px currentColor;
}

button.active{
  background:var(--cyan);
  color:black;
  box-shadow:0 0 18px var(--cyanGlow);
}

.toolGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.stageWrap{
  min-height:0;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.stagePanel{
  flex:1;
  min-height:0;
  background:rgba(0,0,0,0.72);
  border:1px solid rgba(0,255,225,0.5);
  border-radius:20px;
  padding:12px;
  box-shadow:0 0 24px rgba(0,255,225,0.14);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}

.canvasShell{
  max-width:100%;
  max-height:100%;
  aspect-ratio:16 / 9;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

#paint{
  width:100%;
  height:auto;
  max-height:100%;
  background:black;
  border:1px solid var(--cyan);
  border-radius:12px;
  cursor:crosshair;
  touch-action:none;
  box-shadow:0 0 20px rgba(0,255,225,0.18);
  image-rendering:auto;
}

.stageFooter{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
}

.status{
  color:var(--muted);
  font-size:12px;
  padding:9px 12px;
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(0,255,225,0.25);
  border-radius:999px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.frameStrip{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:6px;
  border:1px solid rgba(0,255,225,0.22);
  border-radius:14px;
  background:rgba(0,0,0,0.35);
}

.frameThumb{
  flex:0 0 82px;
  height:52px;
  border:1px solid rgba(0,255,225,0.35);
  border-radius:10px;
  background:black;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.frameThumb.active{
  border-color:var(--cyan);
  box-shadow:0 0 14px var(--cyanGlow);
}

.frameThumb canvas{
  width:100%;
  height:100%;
  display:block;
}

.frameThumb span{
  position:absolute;
  left:4px;
  bottom:3px;
  background:rgba(0,0,0,0.75);
  color:var(--cyan);
  font-size:10px;
  padding:1px 4px;
  border-radius:999px;
}

.smallNote{
  margin-top:8px;
  color:var(--muted);
  font-size:12px;
}

#toast{
  position:fixed;
  left:50%;
  bottom:18px;
  transform:translateX(-50%) translateY(20px);
  opacity:0;
  z-index:60;
  background:rgba(0,0,0,0.78);
  color:var(--cyan);
  border:1px solid currentColor;
  box-shadow:0 0 18px currentColor;
  padding:10px 14px;
  border-radius:999px;
  transition:0.2s;
  pointer-events:none;
}

#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

@media(max-width:980px){
  html,body{
    overflow:auto;
  }

  .page{
    height:auto;
  }

  .app{
    grid-template-columns:1fr;
  }

  .stagePanel{
    min-height:360px;
  }

  .stageFooter{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div id="darkWash"></div>
<div id="bottomGlow"></div>
<div id="toast">Ready.</div>

<div class="page">

  <header class="topbar">
    <div class="brand">
      <h1>🎨 JERRY Paint Lab</h1>
      <span>lightweight drawing + animation lab</span>
    </div>

    <nav class="navLinks">
      <a href="../">JERRY Tools</a>
      <button id="downloadBtn">Download PNG</button>
    </nav>
  </header>

  <main class="app">

    <aside class="panel">
      <h2>Tools</h2>

      <div class="toolGrid">
        <button class="toolBtn active" data-tool="draw">Draw</button>
        <button class="toolBtn" data-tool="erase">Erase</button>
        <button class="toolBtn" data-tool="glitch">Glitch</button>
        <button class="toolBtn" data-tool="line">Line</button>
      </div>

      <label>Color</label>
      <input type="color" id="color" value="#00ffe1" />

      <label>Brush Size: <span id="sizeRead">8</span></label>
      <input type="range" id="size" min="1" max="80" value="8" />

      <label>Canvas Size</label>
      <div class="row">
        <input id="canvasW" type="number" min="64" max="1920" value="960" />
        <input id="canvasH" type="number" min="64" max="1080" value="540" />
      </div>

      <button id="resizeCanvasBtn" style="margin-top:8px;">Resize Canvas</button>

      <label>Import Image</label>
      <input type="file" id="file" accept="image/*" />

      <div class="row" style="margin-top:8px;">
        <button id="clearFrameBtn">Clear Frame</button>
        <button id="warpBtn">Warp</button>
      </div>

      <p class="smallNote">
        Draw strokes are now connected smoothly instead of tiny disconnected dots.
      </p>
    </aside>

    <section class="stageWrap">
      <div class="stagePanel">
        <div class="canvasShell">
          <canvas id="paint" width="960" height="540"></canvas>
        </div>
      </div>

      <div class="stageFooter">
        <div class="status" id="status">Frame 1 / 1 • Tool: Draw</div>
        <div class="row">
          <button id="playBtn">Play</button>
          <button id="stopBtn">Stop</button>
        </div>
      </div>
    </section>

    <aside class="panel">
      <h2>Animation</h2>

      <div class="row">
        <button id="prevFrameBtn">Prev</button>
        <button id="nextFrameBtn">Next</button>
      </div>

      <div class="row" style="margin-top:8px;">
        <button id="addFrameBtn">Add</button>
        <button id="duplicateFrameBtn">Duplicate</button>
      </div>

      <div class="row" style="margin-top:8px;">
        <button id="deleteFrameBtn">Delete</button>
        <button id="exportSheetBtn">Export Sheet</button>
      </div>

      <label>FPS: <span id="fpsRead">8</span></label>
      <input type="range" id="fpsSlider" min="1" max="24" value="8" />

      <label>
        <input type="checkbox" id="onionToggle" checked style="width:auto;" />
        Onion Skin Previous Frame
      </label>

      <h2 style="margin-top:14px;">Frames</h2>
      <div class="frameStrip" id="frameStrip"></div>

      <p class="smallNote">
        Animation plays inside the editor. Export Sheet downloads all frames in one image for now.
      </p>
    </aside>

  </main>
</div>

<script>
/* =========================
   MATRIX BACKGROUND
========================= */
const matrix = document.getElementById("matrix");
const mc = matrix.getContext("2d");

let matrixSize = 16;
let drops = [];

function resizeMatrix(){
  matrix.width = innerWidth;
  matrix.height = innerHeight;
  const cols = Math.floor(matrix.width / matrixSize);
  drops = Array(cols).fill(1);
}

resizeMatrix();
addEventListener("resize", resizeMatrix);

const chars = "JERRY0123456789+-*/=x^()PAINT";

function drawMatrix(){
  mc.fillStyle = "rgba(0,0,0,.1)";
  mc.fillRect(0,0,matrix.width,matrix.height);
  mc.fillStyle = getComputedStyle(document.body).color;
  mc.font = "14px monospace";

  drops.forEach((y,i)=>{
    const t = chars[Math.floor(Math.random() * chars.length)];
    mc.fillText(t, i * 18, y * 18);

    if(y * 18 > matrix.height && Math.random() > 0.98){
      drops[i] = 0;
    }

    drops[i]++;
  });
}

setInterval(drawMatrix, 50);

/* =========================
   ELEMENTS
========================= */
const canvas = document.getElementById("paint");
const ctx = canvas.getContext("2d");

const colorInput = document.getElementById("color");
const sizeInput = document.getElementById("size");
const sizeRead = document.getElementById("sizeRead");

const fileInput = document.getElementById("file");
const clearFrameBtn = document.getElementById("clearFrameBtn");
const warpBtn = document.getElementById("warpBtn");
const downloadBtn = document.getElementById("downloadBtn");

const canvasW = document.getElementById("canvasW");
const canvasH = document.getElementById("canvasH");
const resizeCanvasBtn = document.getElementById("resizeCanvasBtn");

const addFrameBtn = document.getElementById("addFrameBtn");
const duplicateFrameBtn = document.getElementById("duplicateFrameBtn");
const deleteFrameBtn = document.getElementById("deleteFrameBtn");
const prevFrameBtn = document.getElementById("prevFrameBtn");
const nextFrameBtn = document.getElementById("nextFrameBtn");
const frameStrip = document.getElementById("frameStrip");

const playBtn = document.getElementById("playBtn");
const stopBtn = document.getElementById("stopBtn");
const fpsSlider = document.getElementById("fpsSlider");
const fpsRead = document.getElementById("fpsRead");
const onionToggle = document.getElementById("onionToggle");
const exportSheetBtn = document.getElementById("exportSheetBtn");

const status = document.getElementById("status");
const toast = document.getElementById("toast");

let tool = "draw";
let drawing = false;
let lastPoint = null;
let lineStart = null;

let frames = [];
let currentFrame = 0;
let playing = false;
let playTimer = null;

/* =========================
   FRAME STORAGE
========================= */
function makeBlankFrame(){
  const off = document.createElement("canvas");
  off.width = canvas.width;
  off.height = canvas.height;
  const g = off.getContext("2d");
  g.fillStyle = "black";
  g.fillRect(0,0,off.width,off.height);
  return off;
}

function saveCanvasToFrame(){
  const frame = frames[currentFrame];
  if(!frame) return;
  const g = frame.getContext("2d");
  g.clearRect(0,0,frame.width,frame.height);
  g.drawImage(canvas,0,0);
}

function loadFrameToCanvas(index){
  const frame = frames[index];
  if(!frame) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(frame,0,0);
  currentFrame = index;

  if(onionToggle.checked){
    drawOnionSkin();
  }

  updateUI();
}

function drawOnionSkin(){
  if(currentFrame <= 0) return;

  const prev = frames[currentFrame - 1];
  if(!prev) return;

  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.drawImage(prev,0,0);
  ctx.restore();
}

function commitCurrentVisibleFrame(){
  /*
    Onion skin is only a preview, so before saving the frame,
    reload the real frame first if onion skin is on.
  */
  if(onionToggle.checked){
    const real = frames[currentFrame];
    const temp = document.createElement("canvas");
    temp.width = canvas.width;
    temp.height = canvas.height;
    temp.getContext("2d").drawImage(real,0,0);

    const g = frames[currentFrame].getContext("2d");
    g.clearRect(0,0,canvas.width,canvas.height);
    g.drawImage(canvas,0,0);
  }else{
    saveCanvasToFrame();
  }
}

function setFrame(index){
  saveCanvasToFrame();
  currentFrame = Math.max(0, Math.min(frames.length - 1, index));
  loadFrameToCanvas(currentFrame);
}

function addFrame(){
  saveCanvasToFrame();
  const blank = makeBlankFrame();
  frames.splice(currentFrame + 1, 0, blank);
  currentFrame++;
  loadFrameToCanvas(currentFrame);
  showToast("Frame added.");
}

function duplicateFrame(){
  saveCanvasToFrame();

  const copy = document.createElement("canvas");
  copy.width = canvas.width;
  copy.height = canvas.height;
  copy.getContext("2d").drawImage(frames[currentFrame],0,0);

  frames.splice(currentFrame + 1, 0, copy);
  currentFrame++;
  loadFrameToCanvas(currentFrame);
  showToast("Frame duplicated.");
}

function deleteFrame(){
  if(frames.length <= 1){
    clearFrame();
    return;
  }

  frames.splice(currentFrame, 1);
  currentFrame = Math.max(0, currentFrame - 1);
  loadFrameToCanvas(currentFrame);
  showToast("Frame deleted.");
}

/* =========================
   DRAWING
========================= */
function getCanvasPoint(event){
  const rect = canvas.getBoundingClientRect();
  const point = event.touches ? event.touches[0] : event;

  const x = (point.clientX - rect.left) * (canvas.width / rect.width);
  const y = (point.clientY - rect.top) * (canvas.height / rect.height);

  return { x, y };
}

function beginDraw(event){
  event.preventDefault();
  if(playing) stopPlayback();

  drawing = true;
  lastPoint = getCanvasPoint(event);

  if(tool === "line"){
    lineStart = lastPoint;
    return;
  }

  drawStroke(lastPoint, lastPoint);
}

function moveDraw(event){
  if(!drawing) return;
  event.preventDefault();

  const point = getCanvasPoint(event);

  if(tool === "line"){
    redrawWithPreviewLine(point);
    return;
  }

  drawStroke(lastPoint, point);
  lastPoint = point;
  saveCanvasToFrame();
  renderFrameStrip();
}

function endDraw(event){
  if(!drawing) return;
  event.preventDefault();

  if(tool === "line" && lineStart){
    const point = getCanvasPoint(event);
    loadFrameRaw(currentFrame);
    drawLine(lineStart, point);
    lineStart = null;
  }

  drawing = false;
  lastPoint = null;
  saveCanvasToFrame();
  renderFrameStrip();
}

function drawStroke(a,b){
  ctx.lineWidth = Number(sizeInput.value);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  if(tool === "erase"){
    ctx.globalCompositeOperation = "destination-out";
    ctx.strokeStyle = "rgba(0,0,0,1)";
  }else if(tool === "glitch"){
    ctx.globalCompositeOperation = "lighter";
    ctx.strokeStyle = randomGlitchColor();
  }else{
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = colorInput.value;
  }

  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.stroke();

  if(tool === "glitch"){
    ctx.beginPath();
    ctx.moveTo(a.x + random(-8,8), a.y + random(-8,8));
    ctx.lineTo(b.x + random(-8,8), b.y + random(-8,8));
    ctx.strokeStyle = randomGlitchColor();
    ctx.stroke();
  }

  ctx.globalCompositeOperation = "source-over";
}

function drawLine(a,b){
  ctx.lineWidth = Number(sizeInput.value);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.globalCompositeOperation = tool === "erase" ? "destination-out" : "source-over";
  ctx.strokeStyle = tool === "erase" ? "rgba(0,0,0,1)" : colorInput.value;

  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.stroke();

  ctx.globalCompositeOperation = "source-over";
}

function redrawWithPreviewLine(point){
  loadFrameRaw(currentFrame);
  drawLine(lineStart, point);
}

function loadFrameRaw(index){
  const frame = frames[index];
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(frame,0,0);
}

function randomGlitchColor(){
  const colors = ["#ff00ff","#00ffff","#ffff00","#ff3355","#33ff99"];
  return colors[Math.floor(Math.random() * colors.length)];
}

function random(min,max){
  return min + Math.random() * (max - min);
}

canvas.addEventListener("pointerdown", beginDraw);
canvas.addEventListener("pointermove", moveDraw);
canvas.addEventListener("pointerup", endDraw);
canvas.addEventListener("pointerleave", endDraw);
canvas.addEventListener("pointercancel", endDraw);

/* =========================
   TOOLS
========================= */
document.querySelectorAll(".toolBtn").forEach(button=>{
  button.addEventListener("click", ()=>{
    tool = button.dataset.tool;
    document.querySelectorAll(".toolBtn").forEach(btn=>{
      btn.classList.toggle("active", btn === button);
    });
    updateUI();
  });
});

sizeInput.addEventListener("input", ()=>{
  sizeRead.textContent = sizeInput.value;
});

function clearFrame(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  saveCanvasToFrame();
  renderFrameStrip();
  showToast("Frame cleared.");
}

clearFrameBtn.addEventListener("click", clearFrame);

warpBtn.addEventListener("click", ()=>{
  saveCanvasToFrame();
  const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let y = 0; y < imgData.height; y++){
    const shift = Math.sin(y / 18) * 12;
    ctx.putImageData(imgData, shift, y, 0, y, imgData.width, 1);
  }

  saveCanvasToFrame();
  renderFrameStrip();
  showToast("Warped.");
});

/* =========================
   IMAGE IMPORT
========================= */
fileInput.addEventListener("change", event=>{
  const file = event.target.files[0];
  if(!file) return;

  const img = new Image();

  img.onload = ()=>{
    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
    const w = img.width * scale;
    const h = img.height * scale;
    const x = (canvas.width - w) / 2;
    const y = (canvas.height - h) / 2;

    ctx.drawImage(img,x,y,w,h);
    saveCanvasToFrame();
    renderFrameStrip();
    showToast("Image imported.");
    URL.revokeObjectURL(img.src);
  };

  img.src = URL.createObjectURL(file);
});

/* =========================
   CANVAS SIZE
========================= */
resizeCanvasBtn.addEventListener("click", ()=>{
  const newW = clamp(Number(canvasW.value) || 960, 64, 1920);
  const newH = clamp(Number(canvasH.value) || 540, 64, 1080);

  if(!confirm("Resize canvas? This will scale all frames.")) return;

  saveCanvasToFrame();

  frames = frames.map(frame=>{
    const resized = document.createElement("canvas");
    resized.width = newW;
    resized.height = newH;
    const g = resized.getContext("2d");
    g.fillStyle = "black";
    g.fillRect(0,0,newW,newH);
    g.drawImage(frame,0,0,newW,newH);
    return resized;
  });

  canvas.width = newW;
  canvas.height = newH;

  loadFrameToCanvas(currentFrame);
  renderFrameStrip();
  showToast("Canvas resized.");
});

function clamp(value,min,max){
  return Math.max(min, Math.min(max, value));
}

/* =========================
   ANIMATION
========================= */
addFrameBtn.addEventListener("click", addFrame);
duplicateFrameBtn.addEventListener("click", duplicateFrame);
deleteFrameBtn.addEventListener("click", deleteFrame);

prevFrameBtn.addEventListener("click", ()=>{
  setFrame(currentFrame - 1);
});

nextFrameBtn.addEventListener("click", ()=>{
  setFrame(currentFrame + 1);
});

fpsSlider.addEventListener("input", ()=>{
  fpsRead.textContent = fpsSlider.value;
  if(playing){
    stopPlayback();
    startPlayback();
  }
});

playBtn.addEventListener("click", startPlayback);
stopBtn.addEventListener("click", stopPlayback);

function startPlayback(){
  saveCanvasToFrame();

  if(playing) return;
  playing = true;
  playBtn.classList.add("active");

  let i = currentFrame;

  playTimer = setInterval(()=>{
    i = (i + 1) % frames.length;
    currentFrame = i;
    loadFrameRaw(currentFrame);
    updateUI(false);
    renderFrameStrip();
  }, 1000 / Number(fpsSlider.value));

  showToast("Playing animation.");
}

function stopPlayback(){
  playing = false;
  clearInterval(playTimer);
  playTimer = null;
  playBtn.classList.remove("active");
  loadFrameToCanvas(currentFrame);
  showToast("Stopped.");
}

/* =========================
   EXPORTS
========================= */
downloadBtn.addEventListener("click", ()=>{
  saveCanvasToFrame();

  const a = document.createElement("a");
  a.download = "jerry_paint_frame.png";
  a.href = frames[currentFrame].toDataURL("image/png");
  a.click();

  showToast("Downloaded PNG.");
});

exportSheetBtn.addEventListener("click", ()=>{
  saveCanvasToFrame();

  const cols = Math.ceil(Math.sqrt(frames.length));
  const rows = Math.ceil(frames.length / cols);

  const sheet = document.createElement("canvas");
  sheet.width = canvas.width * cols;
  sheet.height = canvas.height * rows;

  const g = sheet.getContext("2d");
  g.fillStyle = "black";
  g.fillRect(0,0,sheet.width,sheet.height);

  frames.forEach((frame,index)=>{
    const x = (index % cols) * canvas.width;
    const y = Math.floor(index / cols) * canvas.height;
    g.drawImage(frame,x,y);
  });

  const a = document.createElement("a");
  a.download = "jerry_animation_sheet.png";
  a.href = sheet.toDataURL("image/png");
  a.click();

  showToast("Exported sprite sheet.");
});

/* =========================
   UI
========================= */
function renderFrameStrip(){
  frameStrip.innerHTML = "";

  frames.forEach((frame,index)=>{
    const wrap = document.createElement("div");
    wrap.className = "frameThumb";
    wrap.classList.toggle("active", index === currentFrame);

    const thumb = document.createElement("canvas");
    thumb.width = 160;
    thumb.height = 100;
    const g = thumb.getContext("2d");
    g.fillStyle = "black";
    g.fillRect(0,0,thumb.width,thumb.height);
    g.drawImage(frame,0,0,thumb.width,thumb.height);

    const label = document.createElement("span");
    label.textContent = index + 1;

    wrap.appendChild(thumb);
    wrap.appendChild(label);

    wrap.addEventListener("click", ()=>{
      setFrame(index);
    });

    frameStrip.appendChild(wrap);
  });
}

function updateUI(renderFrames = true){
  status.textContent = `Frame ${currentFrame + 1} / ${frames.length} • Tool: ${tool}`;
  if(renderFrames) renderFrameStrip();
}

function showToast(message){
  toast.textContent = message;
  toast.classList.add("show");

  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(()=>{
    toast.classList.remove("show");
  }, 1400);
}

/* =========================
   INIT
========================= */
function init(){
  canvas.width = 960;
  canvas.height = 540;
  canvasW.value = canvas.width;
  canvasH.value = canvas.height;

  const first = makeBlankFrame();
  frames = [first];
  currentFrame = 0;
  loadFrameToCanvas(0);

  sizeRead.textContent = sizeInput.value;
  fpsRead.textContent = fpsSlider.value;

  updateUI();
  showToast("Paint Lab ready.");
}

init();
</script>
